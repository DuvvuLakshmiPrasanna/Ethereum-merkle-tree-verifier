services:
  merkle-verifier:
    build: .
    image: merkle-ethereum-verifier
    container_name: merkle-verifier
    environment:
      ETH_RPC_URL: ${ETH_RPC_URL:-}
      RPC_URL: ${RPC_URL:-https://ethereum.publicnode.com}
    # Run the unified demo entrypoint (Part 1 always runs; Part 2/3 run when RPC is configured)
    command: python main.py

  # Run only Part 1 (no RPC URL needed)
  merkle-tests:
    build: .
    image: merkle-ethereum-verifier
    container_name: merkle-tests
    command: pytest tests/ -v --tb=short
    profiles:
      - test

  # Run only the Merkle tree (Part 1) without network
  merkle-part1:
    build: .
    image: merkle-ethereum-verifier
    container_name: merkle-part1
    command: python part1_tree.py
    profiles:
      - part1
